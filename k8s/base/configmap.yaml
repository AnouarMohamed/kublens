apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-ops-config
  namespace: kubernetes-operations-dashboard
  labels:
    app.kubernetes.io/name: kubernetes-operations-dashboard
data:
  PORT: "3000"
  DIST_DIR: "dist"
  APP_MODE: "demo"
  DEV_MODE: "false"
  KUBECONFIG_CONTEXTS: ""

  PREDICTOR_BASE_URL: "http://k8s-ops-predictor:8001"
  PREDICTOR_TIMEOUT_SECONDS: "4"
  GHOST_ENABLED: "true"
  GHOST_ENGINE_ADDR: "k8s-ops-ghost-engine:8091"
  GHOST_ENGINE_TIMEOUT_SECONDS: "5"

  ASSISTANT_PROVIDER: "none"
  ASSISTANT_TIMEOUT_SECONDS: "8"
  ASSISTANT_API_BASE_URL: "https://api.openai.com/v1"
  ASSISTANT_MODEL: ""
  ASSISTANT_TEMPERATURE: "0.2"
  ASSISTANT_MAX_TOKENS: "700"
  ASSISTANT_RAG_ENABLED: "true"
  ASSISTANT_EMBEDDING_MODEL: ""
  ASSISTANT_EMBEDDING_BASE_URL: ""

  AUTH_ENABLED: "false"
  AUTH_ALLOW_HEADER_TOKEN: "false"
  AUTH_TRUSTED_CSRF_DOMAINS: ""
  AUTH_TOKENS: ""
  AUTH_PROVIDER: ""
  AUTH_OIDC_ENABLED: "false"
  AUTH_OIDC_ISSUER_URL: ""
  AUTH_OIDC_CLIENT_ID: ""
  AUTH_OIDC_USERNAME_CLAIM: ""
  AUTH_OIDC_ROLE_CLAIM: ""

  WRITE_ACTIONS_ENABLED: "false"

  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS: "300"
  RATE_LIMIT_WINDOW_SECONDS: "60"

  AUDIT_LOG_FILE: ""
  AUDIT_MAX_ITEMS: "500"

  ALERT_TIMEOUT_SECONDS: "5"
  ALERTMANAGER_WEBHOOK_URL: ""
  SLACK_WEBHOOK_URL: ""
  PAGERDUTY_EVENTS_URL: "https://events.pagerduty.com/v2/enqueue"
