---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jaeger-ingress-egress
  namespace: kubernetes-operations-dashboard
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: k8s-ops-jaeger
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: kubernetes-operations-dashboard
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: k8s-ops-predictor
      ports:
        - protocol: TCP
          port: 4317
        - protocol: TCP
          port: 4318
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 16686
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
