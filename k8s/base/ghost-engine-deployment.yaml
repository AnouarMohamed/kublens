apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ops-ghost-engine
  namespace: kubernetes-operations-dashboard
  labels:
    app.kubernetes.io/name: k8s-ops-ghost-engine
    app.kubernetes.io/part-of: kubernetes-operations-dashboard
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-ops-ghost-engine
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-ops-ghost-engine
        app.kubernetes.io/part-of: kubernetes-operations-dashboard
    spec:
      containers:
        - name: ghost-engine
          image: ghcr.io/anouarmohamed/kublensghost:v0.4.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: grpc
              containerPort: 8091
          readinessProbe:
            grpc:
              port: 8091
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5
          livenessProbe:
            grpc:
              port: 8091
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsUser: 10001
            runAsGroup: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
