apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-operations-dashboard
  namespace: kubernetes-operations-dashboard
  labels:
    app.kubernetes.io/name: kubernetes-operations-dashboard
    app.kubernetes.io/part-of: kubernetes-operations-dashboard
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: kubernetes-operations-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kubernetes-operations-dashboard
        app.kubernetes.io/part-of: kubernetes-operations-dashboard
    spec:
      serviceAccountName: kubelens-dashboard
      containers:
        - name: dashboard
          image: ghcr.io/anouarmohamed/kublens:v0.4.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: k8s-ops-config
            - secretRef:
                name: k8s-ops-secret
                optional: true
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 5
          startupProbe:
            httpGet:
              path: /api/healthz
              port: http
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 30
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 700m
              memory: 768Mi
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
