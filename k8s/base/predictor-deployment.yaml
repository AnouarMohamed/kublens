apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-ops-predictor
  namespace: kubernetes-operations-dashboard
  labels:
    app.kubernetes.io/name: k8s-ops-predictor
    app.kubernetes.io/part-of: kubernetes-operations-dashboard
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-ops-predictor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-ops-predictor
        app.kubernetes.io/part-of: kubernetes-operations-dashboard
    spec:
      serviceAccountName: kubelens-predictor
      containers:
        - name: predictor
          image: ghcr.io/anouarmohamed/kublenspredictor:v0.4.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8001
          envFrom:
            - secretRef:
                name: k8s-ops-secret
                optional: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 400m
              memory: 384Mi
          securityContext:
            runAsUser: 10001
            runAsGroup: 10001
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
