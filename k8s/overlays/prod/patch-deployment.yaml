apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-operations-dashboard
  namespace: kubernetes-operations-dashboard
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: dashboard
          envFrom:
            - configMapRef:
                name: k8s-ops-config
            - secretRef:
                name: k8s-ops-secret
                optional: false
          env:
            - name: AUTH_TOKENS
              valueFrom:
                secretKeyRef:
                  name: k8s-ops-secret
                  key: AUTH_TOKENS
            - name: PREDICTOR_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: k8s-ops-secret
                  key: PREDICTOR_SHARED_SECRET
            - name: KUBECONFIG_DATA
              valueFrom:
                secretKeyRef:
                  name: k8s-ops-secret
                  key: KUBECONFIG_DATA
          readinessProbe:
            httpGet:
              path: /api/readiness/production
              port: http
