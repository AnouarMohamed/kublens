apiVersion: v1
kind: Secret
metadata:
  name: k8s-ops-secret
  namespace: kubernetes-operations-dashboard
  labels:
    app.kubernetes.io/name: kubernetes-operations-dashboard
type: Opaque
stringData:
  # Base64 kubeconfig payload for live-cluster mode (optional in demo mode).
  KUBECONFIG_DATA: ""

  # Required for prod mode when AUTH_ENABLED=true.
  # Format: user:role:token,user:role:token
  AUTH_TOKENS: ""

  # Optional AI provider key when ASSISTANT_PROVIDER=openai_compatible.
  ASSISTANT_API_KEY: ""

  # Optional API key for embedding model (defaults to ASSISTANT_API_KEY if omitted).
  ASSISTANT_EMBEDDING_API_KEY: ""

  # Optional shared secret between dashboard backend and predictor service.
  PREDICTOR_SHARED_SECRET: ""

  # Required when DATABASE_DRIVER=postgres. May contain username/password.
  DATABASE_URL: ""

  # Recommended in prod for tamper-evident audit verification.
  AUDIT_SIGNING_KEY: ""

  # Optional PagerDuty integration key for alert dispatch.
  PAGERDUTY_ROUTING_KEY: ""
