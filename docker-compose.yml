services:
  kubernetes-operations-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: kubernetes-operations-dashboard:v0.4.1
    container_name: kubernetes-operations-dashboard
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      DIST_DIR: "dist"
      APP_MODE: ${APP_MODE:-demo}
      DEV_MODE: ${DEV_MODE:-false}
      KUBECONFIG_DATA: ${KUBECONFIG_DATA:-}
      KUBECONFIG_CONTEXTS: ${KUBECONFIG_CONTEXTS:-}
      PREDICTOR_BASE_URL: ${PREDICTOR_BASE_URL:-http://k8s-ops-predictor:8001}
      PREDICTOR_TIMEOUT_SECONDS: ${PREDICTOR_TIMEOUT_SECONDS:-4}
      PREDICTOR_SHARED_SECRET: ${PREDICTOR_SHARED_SECRET:-}
      GHOST_ENABLED: ${GHOST_ENABLED:-true}
      GHOST_ENGINE_ADDR: ${GHOST_ENGINE_ADDR:-k8s-ops-ghost-engine:8091}
      GHOST_ENGINE_TIMEOUT_SECONDS: ${GHOST_ENGINE_TIMEOUT_SECONDS:-5}
      ASSISTANT_PROVIDER: ${ASSISTANT_PROVIDER:-none}
      ASSISTANT_TIMEOUT_SECONDS: ${ASSISTANT_TIMEOUT_SECONDS:-8}
      ASSISTANT_API_BASE_URL: ${ASSISTANT_API_BASE_URL:-https://api.openai.com/v1}
      ASSISTANT_API_KEY: ${ASSISTANT_API_KEY:-}
      ASSISTANT_MODEL: ${ASSISTANT_MODEL:-}
      ASSISTANT_TEMPERATURE: ${ASSISTANT_TEMPERATURE:-0.2}
      ASSISTANT_MAX_TOKENS: ${ASSISTANT_MAX_TOKENS:-700}
      ASSISTANT_RAG_ENABLED: ${ASSISTANT_RAG_ENABLED:-true}
      MEMORY_FILE_PATH: ${MEMORY_FILE_PATH:-data/memory-runbooks.json}
      CHATOPS_SLACK_WEBHOOK_URL: ${CHATOPS_SLACK_WEBHOOK_URL:-}
      CHATOPS_BASE_URL: ${CHATOPS_BASE_URL:-http://localhost:5173}
      CHATOPS_NOTIFY_INCIDENTS: ${CHATOPS_NOTIFY_INCIDENTS:-true}
      CHATOPS_NOTIFY_REMEDIATIONS: ${CHATOPS_NOTIFY_REMEDIATIONS:-true}
      CHATOPS_NOTIFY_POSTMORTEMS: ${CHATOPS_NOTIFY_POSTMORTEMS:-true}
      CHATOPS_NOTIFY_ASSISTANT_FINDINGS: ${CHATOPS_NOTIFY_ASSISTANT_FINDINGS:-false}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      AUTH_ALLOW_HEADER_TOKEN: ${AUTH_ALLOW_HEADER_TOKEN:-false}
      AUTH_TRUSTED_CSRF_DOMAINS: ${AUTH_TRUSTED_CSRF_DOMAINS:-}
      AUTH_TOKENS: ${AUTH_TOKENS:-}
      WRITE_ACTIONS_ENABLED: ${WRITE_ACTIONS_ENABLED:-false}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-300}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      AUDIT_LOG_FILE: ${AUDIT_LOG_FILE:-}
      AUDIT_MAX_ITEMS: ${AUDIT_MAX_ITEMS:-500}
      ALERT_TIMEOUT_SECONDS: ${ALERT_TIMEOUT_SECONDS:-5}
      ALERTMANAGER_WEBHOOK_URL: ${ALERTMANAGER_WEBHOOK_URL:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      PAGERDUTY_EVENTS_URL: ${PAGERDUTY_EVENTS_URL:-https://events.pagerduty.com/v2/enqueue}
      PAGERDUTY_ROUTING_KEY: ${PAGERDUTY_ROUTING_KEY:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-kubelens-backend}
      OTEL_TRACES_SAMPLE_RATIO: ${OTEL_TRACES_SAMPLE_RATIO:-1}
    depends_on:
      - k8s-ops-predictor
      - k8s-ops-ghost-engine
    restart: unless-stopped

  k8s-ops-predictor:
    build:
      context: ./predictor
      dockerfile: Dockerfile
    image: k8s-ops-predictor:v0.4.1
    container_name: k8s-ops-predictor
    ports:
      - "8001:8001"
    environment:
      PREDICTOR_SHARED_SECRET: ${PREDICTOR_SHARED_SECRET:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-grpc}
      OTEL_EXPORTER_OTLP_INSECURE: ${OTEL_EXPORTER_OTLP_INSECURE:-true}
      OTEL_SERVICE_NAME: ${OTEL_PREDICTOR_SERVICE_NAME:-kubelens-predictor}
      OTEL_TRACES_SAMPLE_RATIO: ${OTEL_TRACES_SAMPLE_RATIO:-1}
    restart: unless-stopped

  k8s-ops-ghost-engine:
    build:
      context: .
      dockerfile: ghost-engine/Dockerfile
    image: kubelens-ghost-engine:v0.4.1
    container_name: k8s-ops-ghost-engine
    ports:
      - "8091:8091"
    restart: unless-stopped
