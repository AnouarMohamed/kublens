openapi: 3.0.3
info:
  title: KubeLens API
  version: v0.4.0
  description: Core API contract for KubeLens dashboard and automation clients.
servers:
  - url: /api
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness probe
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /readyz:
    get:
      operationId: getReadiness
      summary: Readiness probe with dependency checks
      responses:
        "200":
          description: Service ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Service degraded or dependency unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /readiness/enterprise:
    get:
      operationId: getEnterpriseReadiness
      summary: Enterprise readiness probe with production posture checks
      responses:
        "200":
          description: Enterprise readiness checks passed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Enterprise readiness checks failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /readiness/production:
    get:
      operationId: getProductionReadiness
      summary: Production readiness posture with blockers and warnings
      responses:
        "200":
          description: Production readiness baseline passed or has warnings only
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionReadinessStatus"
        "503":
          description: Production readiness has blocking issues
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionReadinessStatus"
  /openapi.yaml:
    get:
      operationId: getOpenAPISpec
      summary: OpenAPI contract in YAML format
      responses:
        "200":
          description: OpenAPI document
          content:
            text/plain:
              schema:
                type: string
  /version:
    get:
      operationId: getVersion
      summary: Build and version metadata
      responses:
        "200":
          description: Build metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildInfo"
  /runtime:
    get:
      operationId: getRuntimeStatus
      summary: Runtime posture and capability flags
      responses:
        "200":
          description: Runtime status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeStatus"
  /experimental:
    get:
      operationId: getExperimentalStatus
      summary: Experimental feature gate status
      responses:
        "200":
          description: Experimental feature gate status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExperimentalStatus"
  /experimental/ebpf/nodes:
    get:
      operationId: getExperimentalNodeTelemetry
      summary: Experimental node telemetry report
      responses:
        "200":
          description: Experimental node telemetry report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeTelemetryReport"
    post:
      operationId: postExperimentalNodeTelemetry
      summary: Submit experimental eBPF node telemetry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeTelemetryIngestRequest"
      responses:
        "200":
          description: Accepted node telemetry report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeTelemetryReport"
        "400":
          description: Invalid telemetry payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Operator role or enabled telemetry gate required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /experimental/fleet-drift:
    get:
      operationId: getExperimentalFleetDrift
      summary: Experimental fleet drift report
      responses:
        "200":
          description: Experimental fleet drift report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetDriftReport"
  /experimental/fleet-drift/propose:
    post:
      operationId: postExperimentalFleetDriftPropose
      summary: Generate proposal-only fleet drift review remediations
      responses:
        "200":
          description: Fleet drift proposal report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetDriftProposalReport"
        "403":
          description: Operator role required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /experimental/autonomous-remediation/propose:
    post:
      operationId: postExperimentalAutonomousRemediationPropose
      summary: Generate policy-gated experimental remediation proposals
      responses:
        "200":
          description: Autonomous remediation proposal report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutonomousRemediationReport"
        "403":
          description: Operator role or write gate required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /metrics:
    get:
      operationId: getApiMetrics
      summary: Request and runtime metrics snapshot
      responses:
        "200":
          description: Metrics snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiMetricsSnapshot"
  /metrics/prometheus:
    get:
      operationId: getPrometheusMetrics
      summary: Prometheus exposition for API and runtime metrics
      responses:
        "200":
          description: Prometheus text format
          content:
            text/plain:
              schema:
                type: string
  /slo:
    get:
      operationId: getSLOOverview
      summary: Error budget and service objective overview
      responses:
        "200":
          description: SLO control center snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SLOOverview"
  /rightsizing:
    get:
      operationId: getRightsizingOverview
      summary: Cost and rightsizing advisor overview
      responses:
        "200":
          description: Rightsizing recommendations and GitOps previews
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RightsizingOverview"
  /auth/session:
    get:
      operationId: getAuthSession
      summary: Active auth session
      responses:
        "200":
          description: Session details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
  /auth/login:
    post:
      operationId: postAuthLogin
      summary: Establish cookie session from token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Authenticated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /auth/logout:
    post:
      operationId: postAuthLogout
      summary: Clear cookie session
      responses:
        "200":
          description: Session cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
  /clusters:
    get:
      operationId: getClusters
      summary: List available cluster contexts
      responses:
        "200":
          description: Cluster contexts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterContextList"
  /clusters/select:
    post:
      operationId: postSelectCluster
      summary: Switch active cluster context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Selected context
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterSelectResponse"
  /cluster-info:
    get:
      operationId: getClusterInfo
      summary: Cluster connectivity information
      responses:
        "200":
          description: Cluster info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterInfo"
  /stream:
    get:
      operationId: getStream
      summary: Server-sent events stream
      responses:
        "200":
          description: Event stream
          content:
            text/event-stream:
              schema:
                type: string
  /stream/ws:
    get:
      operationId: getStreamWebSocket
      summary: WebSocket event stream
      responses:
        "101":
          description: Switching protocols to WebSocket
  /namespaces:
    get:
      operationId: listNamespaces
      summary: List namespaces
      responses:
        "200":
          description: Namespace list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
  /pods:
    get:
      operationId: listPods
      summary: List pods across namespaces
      responses:
        "200":
          description: Pod list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PodSummary"
    post:
      operationId: createPod
      summary: Create pod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PodCreateRequest"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /pods/{namespace}/{name}:
    get:
      operationId: getPodDetail
      summary: Get pod detail
      parameters:
        - in: path
          name: namespace
          required: true
          schema:
            type: string
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pod detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PodDetail"
    delete:
      operationId: deletePod
      summary: Delete pod
      parameters:
        - in: path
          name: namespace
          required: true
          schema:
            type: string
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
  /pods/{namespace}/{name}/events:
    get:
      operationId: getPodEvents
      summary: Fetch pod events
      parameters:
        - in: path
          name: namespace
          required: true
          schema:
            type: string
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pod events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/K8sEvent"
  /pods/{namespace}/{name}/logs:
    get:
      operationId: getPodLogs
      summary: Fetch pod logs
      parameters:
        - in: path
          name: namespace
          required: true
          schema:
            type: string
        - in: path
          name: name
          required: true
          schema:
            type: string
        - in: query
          name: lines
          required: false
          schema:
            type: integer
            minimum: 1
            default: 50
        - in: query
          name: container
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Pod log output
          content:
            text/plain:
              schema:
                type: string
  /pods/{namespace}/{name}/logs/stream:
    get:
      operationId: streamPodLogs
      summary: Stream pod logs
      parameters:
        - in: path
          name: namespace
          required: true
          schema:
            type: string
        - in: path
          name: name
          required: true
          schema:
            type: string
        - in: query
          name: tailLines
          required: false
          schema:
            type: integer
            minimum: 1
            default: 100
        - in: query
          name: container
          required: false
          schema:
            type: string
        - in: query
          name: follow
          required: false
          schema:
            type: boolean
            default: true
      responses:
        "200":
          description: Streaming log output
          content:
            text/event-stream:
              schema:
                type: string
  /pods/{namespace}/{name}/describe:
    get:
      operationId: getPodDescribe
      summary: Get kubectl describe output
      parameters:
        - in: path
          name: namespace
          required: true
          schema:
            type: string
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Describe output
          content:
            text/plain:
              schema:
                type: string
  /pods/{namespace}/{name}/restart:
    post:
      operationId: restartPod
      summary: Restart pod
      parameters:
        - in: path
          name: namespace
          required: true
          schema:
            type: string
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
  /nodes:
    get:
      operationId: listNodes
      summary: List nodes
      responses:
        "200":
          description: Node list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NodeSummary"
  /nodes/{name}:
    get:
      operationId: getNodeDetail
      summary: Get node detail
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Node detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeDetail"
  /nodes/{name}/cordon:
    post:
      operationId: cordonNode
      summary: Cordon node
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
  /nodes/{name}/uncordon:
    post:
      operationId: uncordonNode
      summary: Uncordon node
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
  /nodes/{name}/drain/preview:
    get:
      operationId: previewDrainNode
      summary: Preview node drain safety
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Drain preview details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeDrainPreview"
  /nodes/{name}/drain:
    post:
      operationId: drainNode
      summary: Drain node workloads
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
        - in: query
          name: force
          required: false
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeDrainRequest"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
  /nodes/{name}/pods:
    get:
      operationId: listNodePods
      summary: List pods scheduled on a node
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pod list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PodSummary"
  /nodes/{name}/events:
    get:
      operationId: listNodeEvents
      summary: List events for a node
      parameters:
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Node events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/K8sEvent"
  /resources/{kind}:
    get:
      operationId: listResources
      summary: List resources by kind
      parameters:
        - in: path
          name: kind
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceList"
  /resources/{kind}/{namespace}/{name}/yaml:
    get:
      operationId: getResourceYAML
      summary: Fetch resource YAML
      parameters:
        - in: path
          name: kind
          required: true
          schema:
            type: string
        - in: path
          name: namespace
          required: true
          schema:
            type: string
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resource manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceManifest"
    put:
      operationId: putResourceYAML
      summary: Apply resource YAML
      parameters:
        - in: path
          name: kind
          required: true
          schema:
            type: string
        - in: path
          name: namespace
          required: true
          schema:
            type: string
        - in: path
          name: name
          required: true
          schema:
            type: string
        - in: query
          name: force
          required: false
          schema:
            type: boolean
          description: Override risk guard when risk score is 50 or higher.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceManifest"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
        "202":
          description: Apply blocked by risk guard pending force override.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceApplyRiskResponse"
  /resources/{kind}/{namespace}/{name}/scale:
    post:
      operationId: postResourceScale
      summary: Scale workload resource
      parameters:
        - in: path
          name: kind
          required: true
          schema:
            type: string
        - in: path
          name: namespace
          required: true
          schema:
            type: string
        - in: path
          name: name
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScaleRequest"
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
  /resources/{kind}/{namespace}/{name}/restart:
    post:
      operationId: postResourceRestart
      summary: Restart workload resource
      parameters:
        - in: path
          name: kind
          required: true
          schema:
            type: string
        - in: path
          name: namespace
          required: true
          schema:
            type: string
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
  /resources/{kind}/{namespace}/{name}/rollback:
    post:
      operationId: postResourceRollback
      summary: Rollback workload resource
      parameters:
        - in: path
          name: kind
          required: true
          schema:
            type: string
        - in: path
          name: namespace
          required: true
          schema:
            type: string
        - in: path
          name: name
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Action result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
  /events:
    get:
      operationId: listEvents
      summary: List cluster events
      responses:
        "200":
          description: Cluster events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/K8sEvent"
  /stats:
    get:
      operationId: getStats
      summary: Cluster stats summary
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterStats"
  /diagnostics:
    get:
      operationId: getDiagnostics
      summary: Deterministic diagnostics analysis
      responses:
        "200":
          description: Diagnostics payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticsResult"
  /predictions:
    get:
      operationId: getPredictions
      summary: Incident risk predictions
      parameters:
        - in: query
          name: force
          schema:
            type: boolean
          required: false
      responses:
        "200":
          description: Prediction payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictionsResult"
  /predictor/model:
    get:
      operationId: getPredictorModelHealth
      summary: Predictor model governance status
      responses:
        "200":
          description: Predictor model health and governance metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictorModelHealth"
  /predictive-incidents:
    get:
      operationId: getPredictiveIncidents
      summary: Legacy alias for incident risk predictions
      deprecated: true
      parameters:
        - in: query
          name: force
          schema:
            type: boolean
          required: false
      responses:
        "200":
          description: Prediction payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictionsResult"
  /ghost/topology:
    get:
      operationId: getGhostTopology
      summary: Current Ghost topology graph
      responses:
        "200":
          description: Ghost topology graph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GhostTopology"
  /ghost/simulations:
    get:
      operationId: listGhostSimulations
      summary: List recent Ghost simulation records
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
          required: false
      responses:
        "200":
          description: Recent simulation records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GhostSimulationListResponse"
    post:
      operationId: postGhostSimulation
      summary: Run a Ghost simulation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GhostSimulationRequest"
      responses:
        "200":
          description: Simulation timeline
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GhostSimulationResult"
        "400":
          description: Invalid simulation request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ghost/simulations/{id}:
    get:
      operationId: getGhostSimulation
      summary: Fetch a persisted Ghost simulation record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Simulation record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GhostSimulationRecord"
        "404":
          description: Simulation record not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /assistant:
    post:
      operationId: postAssistant
      summary: Assistant question/answer endpoint
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                namespace:
                  type: string
                  description: Optional namespace scope for assistant context.
      responses:
        "200":
          description: Assistant response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssistantResponse"
  /assistant/references/feedback:
    post:
      operationId: postAssistantReferenceFeedback
      summary: Record usefulness feedback for a documentation reference
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssistantReferenceFeedbackRequest"
      responses:
        "200":
          description: Feedback result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /rag/telemetry:
    get:
      operationId: getRAGTelemetry
      summary: RAG retrieval telemetry and recent score traces
      parameters:
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 80
      responses:
        "200":
