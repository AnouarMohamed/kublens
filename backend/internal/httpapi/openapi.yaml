                  $ref: "#/components/schemas/RemediationProposal"
  /remediation/{id}/gitops:
    get:
      operationId: getRemediationGitOpsArtifact
      summary: Get persisted GitOps artifact for a remediation proposal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Persisted remediation GitOps artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemediationGitOpsArtifact"
    post:
      operationId: postRemediationGitOpsArtifact
      summary: Generate or refresh a GitOps artifact for a remediation proposal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Generated remediation GitOps artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemediationGitOpsArtifact"
  /remediation/{id}/approve:
    post:
      operationId: postRemediationApprove
      summary: Approve remediation proposal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Approved proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemediationProposal"
  /remediation/{id}/execute:
    post:
      operationId: postRemediationExecute
      summary: Execute approved remediation proposal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Executed proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemediationProposal"
        "403":
          description: Four-eyes enforcement violation in prod mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /remediation/{id}/reject:
    post:
      operationId: postRemediationReject
      summary: Reject remediation proposal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemediationRejectRequest"
      responses:
        "200":
          description: Rejected proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemediationProposal"
  /memory/runbooks:
    get:
      operationId: getMemoryRunbooks
      summary: Search memory runbooks
      parameters:
        - in: query
          name: q
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Runbook search results
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoryRunbook"
    post:
      operationId: postMemoryRunbookCreate
      summary: Create memory runbook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryRunbookUpsertRequest"
      responses:
        "201":
          description: Runbook created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryRunbook"
  /memory/runbooks/{id}:
    put:
      operationId: putMemoryRunbookUpdate
      summary: Update memory runbook
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryRunbookUpsertRequest"
      responses:
        "200":
          description: Runbook updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryRunbook"
  /memory/fixes:
    get:
      operationId: getMemoryFixes
      summary: List recorded fix patterns
      responses:
        "200":
          description: Fix pattern list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MemoryFixPattern"
    post:
      operationId: postMemoryFixCreate
      summary: Record fix pattern
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryFixCreateRequest"
      responses:
        "201":
          description: Fix pattern recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryFixPattern"
  /risk-guard/analyze:
    post:
      operationId: postRiskGuardAnalyze
      summary: Analyze manifest deployment risk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskAnalyzeRequest"
      responses:
        "200":
          description: Risk report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskReport"
  /audit:
    get:
      operationId: getAuditLog
      summary: Fetch audit log
      responses:
        "200":
          description: Audit log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogResponse"
  /audit/{id}/verify:
    get:
      operationId: getAuditVerification
      summary: Verify audit hash-chain and signature integrity up to one entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Audit entry hash-chain and signature verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditVerification"
        "404":
          description: Audit entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Audit entry hash-chain or signature verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditVerification"
  /alerts/dispatch:
    post:
      operationId: postAlertDispatch
      summary: Dispatch alert to configured channels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AlertDispatchRequest"
      responses:
        "200":
          description: Alert dispatch result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertDispatchResponse"
  /alerts/test:
    post:
      operationId: postAlertTest
      summary: Send a test alert to configured channels
      responses:
        "200":
          description: Test alert result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertDispatchResponse"
  /alerts/lifecycle:
    get:
      operationId: getAlertLifecycle
      summary: List node alert lifecycle states
      responses:
        "200":
          description: Alert lifecycle items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NodeAlertLifecycle"
    post:
      operationId: postAlertLifecycle
      summary: Upsert node alert lifecycle state
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NodeAlertLifecycleUpdateRequest"
      responses:
        "200":
          description: Updated alert lifecycle item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeAlertLifecycle"
components:
  schemas:
    RuntimeStatus:
      type: object
      required:
        - mode
        - devMode
        - insecure
        - isRealCluster
        - authEnabled
        - writeActionsEnabled
        - databaseDriver
        - databaseMigrations
        - enterpriseStorage
        - memoryStore
        - memoryDurable
        - auditStore
        - auditDurable
        - auditSigned
        - predictorEnabled
        - predictorHealthy
        - predictorMode
        - ghostEnabled
        - ghostHealthy
        - assistantEnabled
        - ragEnabled
        - alertsEnabled
        - warnings
      properties:
        mode:
          type: string
        devMode:
          type: boolean
        insecure:
          type: boolean
        isRealCluster:
          type: boolean
        authEnabled:
          type: boolean
        writeActionsEnabled:
          type: boolean
        databaseDriver:
          type: string
        databaseMigrations:
          type: boolean
        enterpriseStorage:
          type: boolean
        memoryStore:
          type: string
        memoryDurable:
          type: boolean
        auditStore:
          type: string
        auditDurable:
          type: boolean
        auditSigned:
          type: boolean
        predictorEnabled:
          type: boolean
        predictorHealthy:
          type: boolean
        predictorLastError:
          type: string
        predictorMode:
          type: string
        ghostEnabled:
          type: boolean
        ghostHealthy:
          type: boolean
        ghostLastError:
          type: string
        assistantEnabled:
          type: boolean
        ragEnabled:
          type: boolean
        alertsEnabled:
          type: boolean
        warnings:
          type: array
          items:
            type: string
    AuthSession:
      type: object
      required:
        - enabled
        - authenticated
        - permissions
      properties:
        enabled:
          type: boolean
        authenticated:
          type: boolean
        user:
          $ref: "#/components/schemas/SessionUser"
        permissions:
          type: array
          items:
            type: string
    SessionUser:
      type: object
      required:
        - name
        - role
      properties:
        name:
          type: string
        role:
          type: string
          enum: [viewer, operator, admin]
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthStatus:
      type: object
      required:
        - status
        - timestamp
        - checks
        - build
      properties:
        status:
          type: string
        timestamp:
          type: string
        checks:
          type: array
          items:
            $ref: "#/components/schemas/HealthCheck"
        build:
          $ref: "#/components/schemas/BuildInfo"
    HealthCheck:
      type: object
      required:
        - name
        - ok
        - message
      properties:
        name:
          type: string
        ok:
          type: boolean
        message:
          type: string
        lastSuccess:
          type: string
        lastFailure:
          type: string
    ProductionReadinessStatus:
      type: object
      required:
        - status
        - generatedAt
        - summary
        - mode
        - blockers
        - warnings
        - checks
        - stores
        - dependencies
        - runbooks
        - build
      properties:
        status:
          type: string
          enum: [ready, degraded, blocked]
        generatedAt:
          type: string
        summary:
          type: string
        mode:
          type: string
        blockers:
          type: array
          items:
            $ref: "#/components/schemas/ProductionReadinessIssue"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ProductionReadinessIssue"
        checks:
          type: array
          items:
            $ref: "#/components/schemas/ProductionReadinessCheck"
        stores:
          $ref: "#/components/schemas/ProductionStorePosture"
        dependencies:
          $ref: "#/components/schemas/ProductionDependencyPosture"
        runbooks:
          type: array
          items:
            $ref: "#/components/schemas/ProductionRunbookLink"
        build:
          $ref: "#/components/schemas/BuildInfo"
    ProductionReadinessIssue:
      type: object
      required:
        - key
        - severity
        - message
        - recommendation
      properties:
        key:
          type: string
        severity:
          type: string
        message:
          type: string
        recommendation:
          type: string
    ProductionReadinessCheck:
      type: object
      required:
        - name
        - ok
        - severity
        - message
      properties:
        name:
          type: string
        ok:
          type: boolean
        severity:
          type: string
        message:
          type: string
    ProductionStorePosture:
      type: object
      required:
        - databaseDriver
        - enterpriseStorage
        - migrationsEnabled
        - memoryStore
        - memoryDurable
        - auditStore
        - auditDurable
        - auditSigned
        - auditSinkFailures
      properties:
        databaseDriver:
          type: string
        enterpriseStorage:
          type: boolean
        migrationsEnabled:
          type: boolean
        memoryStore:
          type: string
        memoryDurable:
          type: boolean
        auditStore:
          type: string
        auditDurable:
          type: boolean
        auditSigned:
          type: boolean
        auditSinkFailures:
          type: integer
        auditSinkLastError:
          type: string
    ProductionDependencyPosture:
      type: object
      required:
        - cluster
        - predictor
        - ghost
        - alerts
      properties:
        cluster:
          $ref: "#/components/schemas/ProductionDependencyStatus"
        predictor:
          $ref: "#/components/schemas/ProductionDependencyStatus"
        ghost:
          $ref: "#/components/schemas/ProductionDependencyStatus"
        alerts:
          $ref: "#/components/schemas/ProductionDependencyStatus"
    ProductionDependencyStatus:
      type: object
      required:
        - enabled
        - healthy
        - message
      properties:
        enabled:
          type: boolean
        healthy:
          type: boolean
        message:
          type: string
        lastSuccess:
          type: string
        lastFailure:
          type: string
    ProductionRunbookLink:
      type: object
      required:
        - title
        - path
      properties:
        title:
          type: string
        path:
          type: string
    BuildInfo:
      type: object
      required:
        - version
        - commit
        - builtAt
      properties:
        version:
          type: string
        commit:
          type: string
        builtAt:
          type: string
    ClusterContext:
      type: object
      required: [name, isRealCluster]
      properties:
        name:
          type: string
        isRealCluster:
          type: boolean
    ClusterContextList:
      type: object
      required: [selected, items]
      properties:
        selected:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/ClusterContext"
    ClusterSelectResponse:
      type: object
      required: [selected]
      properties:
        selected:
          type: string
    ClusterInfo:
      type: object
      required: [isRealCluster]
      properties:
        isRealCluster:
          type: boolean
    PodSummary:
      type: object
      required: [id, name, namespace, status, cpu, memory, age, restarts]
      properties:
        id:
          type: string
        name:
          type: string
        namespace:
          type: string
        nodeName:
          type: string
        status:
          type: string
        cpu:
          type: string
        memory:
          type: string
        age:
          type: string
        restarts:
          type: integer
    PodDetail:
      allOf:
        - $ref: "#/components/schemas/PodSummary"
        - type: object
          properties:
            nodeName:
              type: string
            hostIP:
              type: string
            podIP:
              type: string
            containers:
              type: array
              items:
                $ref: "#/components/schemas/ContainerSpec"
            volumes:
              type: array
              items:
                $ref: "#/components/schemas/NamedVolume"
    ContainerSpec:
      type: object
      required: [name]
      properties:
        name:
          type: string
        image:
          type: string
        env:
          type: array
          items:
            $ref: "#/components/schemas/EnvVar"
        volumeMounts:
          type: array
          items:
            $ref: "#/components/schemas/VolumeMount"
        resources:
          $ref: "#/components/schemas/ContainerResources"
    EnvVar:
      type: object
      required: [name]
      properties:
        name:
          type: string
        value:
          type: string
    VolumeMount:
      type: object
      properties:
        name:
          type: string
        mountPath:
          type: string
    ContainerResources:
      type: object
      properties:
        requests:
          $ref: "#/components/schemas/ResourcePairs"
        limits:
          $ref: "#/components/schemas/ResourcePairs"
    ResourcePairs:
      type: object
      properties:
        cpu:
          type: string
        memory:
          type: string
    NamedVolume:
      type: object
      properties:
        name:
          type: string
    NodeSummary:
      type: object
      required: [name, status, roles, age, version, cpuUsage, memUsage]
      properties:
        name:
          type: string
        status:
          type: string
        roles:
          type: string
        unschedulable:
          type: boolean
        age:
          type: string
        version:
          type: string
        cpuUsage:
          type: string
        memUsage:
          type: string
        cpuHistory:
          type: array
          items:
            $ref: "#/components/schemas/CPUPoint"
    CPUPoint:
      type: object
      properties:
        time:
          type: string
        value:
          type: integer
    NodeDetail:
      allOf:
        - $ref: "#/components/schemas/NodeSummary"
        - type: object
          properties:
            capacity:
              $ref: "#/components/schemas/ResourceCapacity"
            allocatable:
              $ref: "#/components/schemas/ResourceCapacity"
            conditions:
              type: array
              items:
                $ref: "#/components/schemas/NodeCondition"
            addresses:
              type: array
              items:
                $ref: "#/components/schemas/NodeAddress"
    ResourceCapacity:
      type: object
      properties:
        cpu:
          type: string
        memory:
          type: string
        pods:
          type: string
    NodeCondition:
      type: object
      properties:
        type:
          type: string
        status:
          type: string
        lastTransitionTime:
          type: string
        reason:
          type: string
        message:
          type: string
    NodeAddress:
      type: object
      properties:
        type:
          type: string
        address:
          type: string
    NodeDrainPod:
      type: object
      required: [namespace, name]
      properties:
        namespace:
          type: string
        name:
          type: string
        reason:
          type: string
    NodeDrainBlocker:
      type: object
      required: [kind, message, pod]
      properties:
        kind:
          type: string
        message:
          type: string
        pod:
          $ref: "#/components/schemas/NodeDrainPod"
        reference:
          type: string
    NodeDrainPreview:
      type: object
      required: [node, evictable, skipped, blockers, safeToDrain, generatedAt]
      properties:
        node:
          type: string
        evictable:
          type: array
          items:
            $ref: "#/components/schemas/NodeDrainPod"
        skipped:
          type: array
          items:
            $ref: "#/components/schemas/NodeDrainPod"
        blockers:
          type: array
          items:
            $ref: "#/components/schemas/NodeDrainBlocker"
        safeToDrain:
          type: boolean
        generatedAt:
          type: string
    NodeDrainRequest:
      type: object
      required: [force]
      properties:
        force:
          type: boolean
        reason:
          type: string
    K8sEvent:
      type: object
      properties:
        type:
          type: string
        reason:
          type: string
        age:
          type: string
        from:
          type: string
        message:
          type: string
        namespace:
          type: string
        resource:
          type: string
        resourceKind:
          type: string
        count:
          type: integer
        lastTimestamp:
          type: string
    ClusterStats:
      type: object
      required: [pods, nodes, cluster]
      properties:
        pods:
          $ref: "#/components/schemas/PodStats"
        nodes:
          $ref: "#/components/schemas/NodeStats"
        cluster:
          $ref: "#/components/schemas/ClusterCapacity"
    PodStats:
      type: object
      properties:
        total:
          type: integer
        running:
          type: integer
        pending:
          type: integer
        failed:
          type: integer
    NodeStats:
      type: object
      properties:
        total:
          type: integer
        ready:
          type: integer
        notReady:
          type: integer
    ClusterCapacity:
      type: object
      properties:
        cpu:
          type: string
        memory:
          type: string
        storage:
          type: string
    DiagnosticIssue:
      type: object
      required: [severity, message, recommendation]
      properties:
        severity:
          type: string
        resource:
          type: string
        namespace:
          type: string
        message:
          type: string
        evidence:
          type: array
          items:
            type: string
        recommendation:
          type: string
        source:
          type: string
    DiagnosticsResult:
