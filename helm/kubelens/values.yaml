image:
  repository: kubernetes-operations-dashboard
  tag: "v0.4.2"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 3000

predictor:
  enabled: true
  image:
    repository: k8s-ops-predictor
    tag: "v0.4.2"
    pullPolicy: IfNotPresent
  service:
    port: 8001

ghostEngine:
  enabled: true
  image:
    repository: kubelens-ghost-engine
    tag: "v0.4.2"
    pullPolicy: IfNotPresent
  service:
    port: 8091

env:
  APP_MODE: demo
  DEV_MODE: "false"
  AUTH_ENABLED: "false"
  AUTH_TOKENS: ""
  WRITE_ACTIONS_ENABLED: "false"
  PREDICTOR_BASE_URL: ""
  PREDICTOR_SHARED_SECRET: ""
  PREDICTOR_MODE: "deterministic"
  PREDICTOR_MODEL_PATH: ""
  PREDICTOR_MODEL_METADATA_PATH: ""
  PREDICTOR_MIN_FEATURE_COMPLETENESS: "0.80"
  PREDICTOR_MAX_MODEL_AGE_HOURS: "168"
  DATABASE_DRIVER: "sqlite"
  DATABASE_URL: ""
  DATABASE_MIGRATIONS_AUTO: "true"
  DB_PATH: "data/kubelens.db"
  MEMORY_STORE: "file"
  MEMORY_FILE_PATH: "data/memory-runbooks.json"
  GHOST_ENABLED: "true"
  GHOST_ENGINE_ADDR: "kubelens-ghost-engine:8091"
  GHOST_ENGINE_TIMEOUT_SECONDS: "5"
  EXPERIMENTAL_EBPF_TELEMETRY_ENABLED: "false"
  EXPERIMENTAL_FLEET_DRIFT_ENABLED: "false"
  EXPERIMENTAL_AUTONOMOUS_REMEDIATION_ENABLED: "false"
  AUTONOMOUS_REMEDIATION_MIN_RISK_SCORE: "85"
  AUTONOMOUS_REMEDIATION_MAX_PROPOSALS: "5"
  OTEL_EXPORTER_OTLP_ENDPOINT: ""
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
  OTEL_EXPORTER_OTLP_INSECURE: "true"
  OTEL_SERVICE_NAME: kubelens-backend
  OTEL_TRACES_SAMPLE_RATIO: "1"
  AUDIT_STORE: "memory"
  AUDIT_LOG_FILE: ""
  AUDIT_MAX_ITEMS: "500"
  AUDIT_SIGNING_KEY: ""

resources: {}
nodeSelector: {}
tolerations: []
affinity: {}
