name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  release-discipline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify release/version consistency
        run: npm run verify:release

      - name: Verify changelog discipline
        run: npm run verify:changelog

      - name: Verify OpenAPI contract
        run: npm run verify:openapi

      - name: Verify generated API contract sync
        run: npm run verify:api-contract

  docs-discipline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify documentation governance
        run: npm run verify:docs

      - name: Verify documentation impact coverage
        run: npm run verify:doc-impact

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Frontend quality gates
        run: |
          npm run lint
          npm run test:web
          npm run build

  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache-dependency-path: backend/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Backend quality gates
        run: npm run ci:backend

      - name: Backend feature package coverage
        run: |
          node scripts/go-task.mjs -C backend test ./internal/incident ./internal/remediation ./internal/memory ./internal/riskguard ./internal/postmortem ./internal/chatops

  predictor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install predictor deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r predictor/requirements.txt -r predictor/requirements-dev.txt

      - name: Predictor lint and tests
        run: |
          python -m ruff check predictor/app predictor/tests
          python -m pytest predictor/tests -q

  e2e:
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E suite
        run: npm run test:e2e

  manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.5.0"

      - name: Install kubeconform
        run: |
          curl -sSL -o /tmp/kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf /tmp/kubeconform.tar.gz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform

      - name: Validate kustomize overlays
        run: |
          set -e
          for overlay in k8s/overlays/dev k8s/overlays/demo k8s/overlays/prod k8s/overlays/tracing k8s/overlays/observability k8s; do
            echo "Validating $overlay"
            kustomize build "$overlay" > /tmp/manifest.yaml
            kubeconform -strict -summary -ignore-missing-schemas /tmp/manifest.yaml
          done

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache-dependency-path: backend/go.sum

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm ci

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: npm production dependency audit
        run: npm run audit:npm

      - name: Go vulnerability audit
        run: npm run audit:go

      - name: Predictor dependency audit
        run: npm run audit:predictor

      - name: Trivy filesystem scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            aquasec/trivy:0.56.1 \
            fs --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 --ignorefile .trivyignore .

      - name: Hadolint Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: Dockerfile
          config: .hadolint.yaml

      - name: Hadolint predictor Dockerfile
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: predictor/Dockerfile
          config: .hadolint.yaml

  docker-build:
    runs-on: ubuntu-latest
    needs: [release-discipline, docs-discipline, frontend, backend, predictor, e2e, manifests, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build dashboard image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: kubernetes-operations-dashboard:ci

      - name: Build predictor image
        uses: docker/build-push-action@v7
        with:
          context: ./predictor
          file: ./predictor/Dockerfile
          push: false
          load: true
          tags: k8s-ops-predictor:ci

      - name: Smoke test dashboard image
        run: docker run --rm --env APP_MODE=demo --entrypoint /bin/sh kubernetes-operations-dashboard:ci -c "sleep 1 && exit 0"

      - name: Smoke test predictor image
        run: docker run --rm --entrypoint /bin/sh k8s-ops-predictor:ci -c "sleep 1 && exit 0"
