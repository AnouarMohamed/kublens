name: Release Supply Chain

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "Environment to deploy an existing release tag"
        required: true
        type: choice
        default: staging
        options:
          - dev
          - staging
          - prod
      version_tag:
        description: "Existing release tag to deploy (for example v0.4.1)"
        required: true
        type: string
      namespace:
        description: "Kubernetes namespace for Helm release"
        required: false
        type: string
        default: kubernetes-operations-dashboard
      release_name:
        description: "Helm release name"
        required: false
        type: string
        default: kubelens

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  signed-release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      DASHBOARD_IMAGE: ghcr.io/${{ github.repository_owner }}/kubelens
      PREDICTOR_IMAGE: ghcr.io/${{ github.repository_owner }}/kubelenspredictor
      GHOST_ENGINE_IMAGE: ghcr.io/${{ github.repository_owner }}/kubelensghostengine
      DOCKERHUB_DASHBOARD_IMAGE: docker.io/${{ secrets.DOCKER_USERNAME }}/kubelens
      DOCKERHUB_PREDICTOR_IMAGE: docker.io/${{ secrets.DOCKER_USERNAME }}/kubelenspredictor
      DOCKERHUB_GHOST_ENGINE_IMAGE: docker.io/${{ secrets.DOCKER_USERNAME }}/kubelensghost
      VERSION_TAG: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Validate Docker Hub credentials
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          if [ -z "$DOCKER_USERNAME" ] || [ -z "$DOCKER_PASSWORD" ]; then
            echo "DOCKER_USERNAME and DOCKER_PASSWORD repository secrets are required for release publication."
            exit 1
          fi

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push dashboard image
        id: build_dashboard
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:${{ env.VERSION_TAG }}
            ${{ env.DOCKERHUB_DASHBOARD_IMAGE }}:${{ env.VERSION_TAG }}

      - name: Build and push predictor image
        id: build_predictor
        uses: docker/build-push-action@v7
        with:
          context: ./predictor
          file: ./predictor/Dockerfile
          push: true
          tags: |
            ${{ env.PREDICTOR_IMAGE }}:${{ env.VERSION_TAG }}
            ${{ env.DOCKERHUB_PREDICTOR_IMAGE }}:${{ env.VERSION_TAG }}

      - name: Build and push Ghost Engine image
        id: build_ghost_engine
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./ghost-engine/Dockerfile
          push: true
          tags: |
            ${{ env.GHOST_ENGINE_IMAGE }}:${{ env.VERSION_TAG }}
            ${{ env.DOCKERHUB_GHOST_ENGINE_IMAGE }}:${{ env.VERSION_TAG }}

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate dashboard SBOM
        run: |
          syft "${{ env.DASHBOARD_IMAGE }}@${{ steps.build_dashboard.outputs.digest }}" \
            -o cyclonedx-json > dashboard.sbom.cdx.json

      - name: Generate predictor SBOM
        run: |
          syft "${{ env.PREDICTOR_IMAGE }}@${{ steps.build_predictor.outputs.digest }}" \
            -o cyclonedx-json > predictor.sbom.cdx.json

      - name: Generate Ghost Engine SBOM
        run: |
          syft "${{ env.GHOST_ENGINE_IMAGE }}@${{ steps.build_ghost_engine.outputs.digest }}" \
            -o cyclonedx-json > ghost-engine.sbom.cdx.json

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-sboms-${{ env.VERSION_TAG }}
          path: |
            dashboard.sbom.cdx.json
            predictor.sbom.cdx.json
            ghost-engine.sbom.cdx.json

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign dashboard image
        run: cosign sign --yes "${{ env.DASHBOARD_IMAGE }}@${{ steps.build_dashboard.outputs.digest }}"

      - name: Sign predictor image
        run: cosign sign --yes "${{ env.PREDICTOR_IMAGE }}@${{ steps.build_predictor.outputs.digest }}"

      - name: Sign Ghost Engine image
        run: cosign sign --yes "${{ env.GHOST_ENGINE_IMAGE }}@${{ steps.build_ghost_engine.outputs.digest }}"

      - name: Sign Docker Hub dashboard image
        run: cosign sign --yes "${{ env.DOCKERHUB_DASHBOARD_IMAGE }}@${{ steps.build_dashboard.outputs.digest }}"

      - name: Sign Docker Hub predictor image
        run: cosign sign --yes "${{ env.DOCKERHUB_PREDICTOR_IMAGE }}@${{ steps.build_predictor.outputs.digest }}"

      - name: Sign Docker Hub Ghost Engine image
        run: cosign sign --yes "${{ env.DOCKERHUB_GHOST_ENGINE_IMAGE }}@${{ steps.build_ghost_engine.outputs.digest }}"

      - name: Attest dashboard SBOM
        run: |
          cosign attest --yes --type cyclonedx \
            --predicate dashboard.sbom.cdx.json \
            "${{ env.DASHBOARD_IMAGE }}@${{ steps.build_dashboard.outputs.digest }}"

      - name: Attest predictor SBOM
        run: |
          cosign attest --yes --type cyclonedx \
            --predicate predictor.sbom.cdx.json \
            "${{ env.PREDICTOR_IMAGE }}@${{ steps.build_predictor.outputs.digest }}"

      - name: Attest Ghost Engine SBOM
        run: |
          cosign attest --yes --type cyclonedx \
            --predicate ghost-engine.sbom.cdx.json \
            "${{ env.GHOST_ENGINE_IMAGE }}@${{ steps.build_ghost_engine.outputs.digest }}"

      - name: Attest Docker Hub dashboard SBOM
        run: |
          cosign attest --yes --type cyclonedx \
            --predicate dashboard.sbom.cdx.json \
            "${{ env.DOCKERHUB_DASHBOARD_IMAGE }}@${{ steps.build_dashboard.outputs.digest }}"

      - name: Attest Docker Hub predictor SBOM
        run: |
          cosign attest --yes --type cyclonedx \
            --predicate predictor.sbom.cdx.json \
            "${{ env.DOCKERHUB_PREDICTOR_IMAGE }}@${{ steps.build_predictor.outputs.digest }}"

      - name: Attest Docker Hub Ghost Engine SBOM
        run: |
          cosign attest --yes --type cyclonedx \
            --predicate ghost-engine.sbom.cdx.json \
            "${{ env.DOCKERHUB_GHOST_ENGINE_IMAGE }}@${{ steps.build_ghost_engine.outputs.digest }}"

  deploy-dev:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [signed-release]
    runs-on: ubuntu-latest
    environment: dev
    env:
      DASHBOARD_IMAGE: ghcr.io/${{ github.repository_owner }}/kubelens
      PREDICTOR_IMAGE: ghcr.io/${{ github.repository_owner }}/kubelenspredictor
      GHOST_ENGINE_IMAGE: ghcr.io/${{ github.repository_owner }}/kubelensghost
      VERSION_TAG: ${{ github.ref_name }}
      HELM_RELEASE_NAME: kubelens
      HELM_NAMESPACE: kubernetes-operations-dashboard-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Check deployment secret
        id: kubeconfig
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG_B64 }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "KUBE_CONFIG_B64 is not configured for environment dev. Skipping deployment."
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Configure kubeconfig
        if: steps.kubeconfig.outputs.available == 'true'
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy Helm release to dev
        if: steps.kubeconfig.outputs.available == 'true'
        run: |
          helm upgrade --install "$HELM_RELEASE_NAME" ./helm/kubelens \
            --namespace "$HELM_NAMESPACE" \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set image.repository="$DASHBOARD_IMAGE" \
            --set image.tag="$VERSION_TAG" \
            --set predictor.image.repository="$PREDICTOR_IMAGE" \
            --set predictor.image.tag="$VERSION_TAG" \
            --set ghostEngine.image.repository="$GHOST_ENGINE_IMAGE" \
            --set ghostEngine.image.tag="$VERSION_TAG"

      - name: Snapshot deployed resources
        if: steps.kubeconfig.outputs.available == 'true'
        run: |
          kubectl -n "$HELM_NAMESPACE" get deploy
          kubectl -n "$HELM_NAMESPACE" get pods

  deploy-staging:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    environment: staging
    env:
      DASHBOARD_IMAGE: ghcr.io/${{ github.repository_owner }}/kubelens-ai
      PREDICTOR_IMAGE: ghcr.io/${{ github.repository_owner }}/kubelens-ai-predictor
      GHOST_ENGINE_IMAGE: ghcr.io/${{ github.repository_owner }}/kubelens-ai-ghost-engine
      VERSION_TAG: ${{ github.ref_name }}
      HELM_RELEASE_NAME: kubelens
      HELM_NAMESPACE: kubernetes-operations-dashboard-staging
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Check deployment secret
        id: kubeconfig
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG_B64 }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "KUBE_CONFIG_B64 is not configured for environment staging. Skipping deployment."
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Configure kubeconfig
        if: steps.kubeconfig.outputs.available == 'true'
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy Helm release to staging
        if: steps.kubeconfig.outputs.available == 'true'
        run: |
          helm upgrade --install "$HELM_RELEASE_NAME" ./helm/kubelens \
            --namespace "$HELM_NAMESPACE" \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set image.repository="$DASHBOARD_IMAGE" \
            --set image.tag="$VERSION_TAG" \
            --set predictor.image.repository="$PREDICTOR_IMAGE" \
            --set predictor.image.tag="$VERSION_TAG" \
            --set ghostEngine.image.repository="$GHOST_ENGINE_IMAGE" \
            --set ghostEngine.image.tag="$VERSION_TAG"

      - name: Snapshot deployed resources
        if: steps.kubeconfig.outputs.available == 'true'
        run: |
          kubectl -n "$HELM_NAMESPACE" get deploy
          kubectl -n "$HELM_NAMESPACE" get pods

  deploy-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.deploy_environment }}
    env:
      DASHBOARD_IMAGE: ghcr.io/${{ github.repository_owner }}/kubelens
      PREDICTOR_IMAGE: ghcr.io/${{ github.repository_owner }}/kubelenspredictor
      GHOST_ENGINE_IMAGE: ghcr.io/${{ github.repository_owner }}/kubelensghost
      VERSION_TAG: ${{ inputs.version_tag }}
      HELM_RELEASE_NAME: ${{ inputs.release_name }}
      HELM_NAMESPACE: ${{ inputs.namespace }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Validate tag input
        run: |
          case "$VERSION_TAG" in
            v*) ;;
            *)
              echo "version_tag must start with 'v' (example: v0.4.1)"
              exit 1
              ;;
          esac

      - name: Check deployment secret
        id: kubeconfig
        run: |
          if [ -z "${{ secrets.KUBE_CONFIG_B64 }}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "KUBE_CONFIG_B64 is not configured for environment ${{ inputs.deploy_environment }}. Skipping deployment."
            exit 0
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Configure kubeconfig
        if: steps.kubeconfig.outputs.available == 'true'
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy Helm release
        if: steps.kubeconfig.outputs.available == 'true'
        run: |
          helm upgrade --install "$HELM_RELEASE_NAME" ./helm/kubelens \
            --namespace "$HELM_NAMESPACE" \
            --create-namespace \
            --wait \
            --timeout 10m \
            --set image.repository="$DASHBOARD_IMAGE" \
            --set image.tag="$VERSION_TAG" \
            --set predictor.image.repository="$PREDICTOR_IMAGE" \
            --set predictor.image.tag="$VERSION_TAG" \
            --set ghostEngine.image.repository="$GHOST_ENGINE_IMAGE" \
            --set ghostEngine.image.tag="$VERSION_TAG"

      - name: Snapshot deployed resources
        if: steps.kubeconfig.outputs.available == 'true'
        run: |
          kubectl -n "$HELM_NAMESPACE" get deploy
          kubectl -n "$HELM_NAMESPACE" get pods
