name: Docs Governance

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check documentation freshness
        id: docs_freshness
        continue-on-error: true
        run: node scripts/verify-docs.mjs --staleness-days=45 --report-file=docs-staleness-report.md

      - name: Upload docs freshness report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: docs-staleness-report
          path: docs-staleness-report.md

      - name: Create or update stale docs issue
        if: steps.docs_freshness.outcome == 'failure' && github.event_name == 'schedule'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require("node:fs");
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = "Docs governance: stale documentation detected";
            const report = fs.readFileSync("docs-staleness-report.md", "utf8");
            const body = [
              "Automated docs governance detected stale documentation.",
              "",
              report,
            ].join("\n");

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "documentation",
              per_page: 100,
            });
            const existing = openIssues.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["documentation", "governance", "security"],
              });
            }

      - name: Fail run when docs are stale
        if: steps.docs_freshness.outcome == 'failure'
        run: exit 1
